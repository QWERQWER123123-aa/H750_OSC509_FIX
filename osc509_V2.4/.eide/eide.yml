      - <virtual_root>/usbh
      - <virtual_root>/user_usb
    settings:
      debugger: cortex-debug
    toolchain: AC5
    toolchainConfigMap:
      AC5:
        archExtensions: ""
        cpuType: Cortex-M7
        floatingPointHardware: double
        options:
          version: 4
          afterBuildTasks:
            - name: "[Copy linker output for Keil User Commands]"
              abortAfterFailed: true
              command: cd .\MDK-ARM && mkdir ${KEIL_OUTPUT_DIR} & copy "${OutDir}\${ProjectName}.axf" "${KEIL_OUTPUT_DIR}\${KEIL_OUTPUT_NAME}.axf"
              disable: false
            - name: fromelf --bin -o "$L@L.bin" "#L"
              abortAfterFailed: true
              command: cd .\MDK-ARM && fromelf --bin -o "${KEIL_OUTPUT_DIR}\${KEIL_OUTPUT_NAME}.bin" "${KEIL_OUTPUT_DIR}\${KEIL_OUTPUT_NAME}.axf"
              disable: false
          asm-compiler:
            defines: []
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: --diag_suppress=1 --diag_suppress=1295
            C_FLAGS: --diag_suppress=1 --diag_suppress=1295
            c99-mode: true
            one-elf-section-per-function: true
            optimization: level-0
            optimize-for-time: true
            warnings: all-warnings
          global:
            output-debug-info: enable
            use-microLIB: true
          linker:
            $outputTaskExcludes:
              - .bin
            misc-controls: --keep __FS_*;--keep __FS_TSK_*
            output-format: elf
            ro-base: "0x08000000"
            rw-base: "0x20000000"
            xo-base: ""
        scatterFilePath: ""
        storageLayout:
          RAM:
            - id: 1
              isChecked: false
              mem:
