miscInfo:
  uid: f05d05c0b3339d4d506067bcc5d3a124
targets:
  osc-boot:
    cppPreprocessAttrs:
      defineList:
        - USE_HAL_DRIVER
        - STM32H750xx
        - USE_HAL_DRIVER
        - STM32H750xx
      incList:
        - Inc
        - Drivers/STM32H7xx_HAL_Driver/Inc
        - Drivers/STM32H7xx_HAL_Driver/Inc/Legacy
        - Middlewares/Third_Party/FatFs/src
        - Middlewares/ST/STM32_USB_Device_Library/Core/Inc
        - Middlewares/ST/STM32_USB_Device_Library/Class/MSC/Inc
        - Drivers/CMSIS/Device/ST/STM32H7xx/Include
        - Drivers/CMSIS/Include
        - hzs
        - .cmsis/include
        - MDK-ARM/RTE/_osc-boot
      libList: []
    excludeList: []
    settings:
      debugger: cortex-debug
    toolchain: AC5
    toolchainConfigMap:
      AC5:
        archExtensions: ""
        cpuType: Cortex-M7
        floatingPointHardware: double
        options:
          version: 4
          afterBuildTasks: []
          asm-compiler:
            defines: []
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: --diag_suppress=1 --diag_suppress=1295
            C_FLAGS: --diag_suppress=1 --diag_suppress=1295
            c99-mode: true
            one-elf-section-per-function: true
            optimization: level-0
            optimize-for-time: true
            warnings: all-warnings
          global:
            output-debug-info: enable
            use-microLIB: true
          linker:
            $outputTaskExcludes:
              - .bin
            output-format: elf
            ro-base: "0x08000000"
            rw-base: "0x20000000"
            xo-base: ""
        scatterFilePath: MDK-ARM/osc_boot/osc-boot.sct
        storageLayout:
          RAM:
            - id: 1
              isChecked: false
              mem:
                size: "0x48000"
                startAddr: "0x30000000"
              noInit: false
              tag: RAM
            - id: 2
              isChecked: false
              mem:
                size: "0x10000"
                startAddr: "0x38000000"
              noInit: false
              tag: RAM
            - id: 3
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 1
              isChecked: true
              mem:
                size: "0x20000"
                startAddr: "0x20000000"
              noInit: false
              tag: IRAM
            - id: 2
              isChecked: false
              mem:
                size: "0x80000"
                startAddr: "0x24000000"
              noInit: false
              tag: IRAM
          ROM:
            - id: 1
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 2
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 3
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 1
              isChecked: true
              isStartup: true
              mem:
                size: "0x20000"
                startAddr: "0x8000000"
              tag: IROM
            - id: 2
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: IROM
        useCustomScatterFile: false
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
